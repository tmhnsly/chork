<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chork OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,500;0,700;0,800;1,500;1,700;1,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Radix olive-dark canonical values */
    --olive-1:  #111210;
    --olive-2:  #181917;
    --olive-3:  #22231f;
    --olive-4:  #292a26;
    --olive-5:  #30312c;
    --olive-6:  #383933;
    --olive-7:  #43443d;
    --olive-8:  #5b5d52;
    --olive-9:  #687066;
    --olive-10: #767c71;
    --olive-11: #afb1a1;
    --olive-12: #eeeee9;

    /* Lime (dark-variant accent) */
    --lime-8:   #66832b;
    --lime-9:   #bdee63;
    --lime-10:  #d4ff70;
    --lime-11:  #bdee63;
    --lime-12:  #effbcf;

    /* Amber flash */
    --amber-9:  #ffb224;

    /* Teal zone */
    --teal-9:   #12a594;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: var(--olive-12);
    overflow: hidden;
    background: var(--olive-1);
  }

  .stage {
    position: relative;
    width: 1200px; height: 630px;
    overflow: hidden;
    background: var(--olive-1);
  }

  /* ---------- Background scenery (shows through the glass) ---------- */
  .bg {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  /* Big blurred colour blobs — soft macOS desktop-wallpaper feel */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.9;
  }
  .blob-lime {
    width: 720px; height: 720px;
    right: -140px; top: -220px;
    background: radial-gradient(closest-side, rgba(189, 238, 99, 0.55), rgba(189, 238, 99, 0) 70%);
  }
  .blob-amber {
    width: 540px; height: 540px;
    left: -120px; bottom: -180px;
    background: radial-gradient(closest-side, rgba(255, 178, 36, 0.28), rgba(255, 178, 36, 0) 70%);
  }
  .blob-teal {
    width: 520px; height: 520px;
    left: 40%; top: 40%;
    background: radial-gradient(closest-side, rgba(18, 165, 148, 0.22), rgba(18, 165, 148, 0) 70%);
  }
  .blob-olive {
    width: 900px; height: 900px;
    left: -260px; top: -300px;
    background: radial-gradient(closest-side, rgba(104, 112, 102, 0.35), rgba(104, 112, 102, 0) 70%);
  }
  .blob-lime-2 {
    width: 440px; height: 440px;
    right: 180px; bottom: -80px;
    background: radial-gradient(closest-side, rgba(189, 238, 99, 0.22), rgba(189, 238, 99, 0) 70%);
    filter: blur(60px);
  }

  /* Subtle climbing-hold dot field — gives the blur something to grab onto */
  .dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.045) 1.4px, transparent 1.6px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 90%);
  }

  /* Vignette on the background only (outside the card) */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }

  /* ---------- Glass card ---------- */
  .card {
    position: absolute;
    top: 44px; left: 44px; right: 44px; bottom: 44px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.05) 100%);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.14),
      inset 0 -1px 0 rgba(0,0,0,0.18),
      0 30px 80px -20px rgba(0,0,0,0.55),
      0 2px 0 rgba(255,255,255,0.03);
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 34px 44px;
    overflow: hidden;
  }
  /* Specular highlight — tiny moving light top-left, static here */
  .card::before {
    content: '';
    position: absolute;
    top: -120px; left: -80px;
    width: 420px; height: 260px;
    background: radial-gradient(closest-side, rgba(255,255,255,0.14), transparent 70%);
    filter: blur(20px);
    pointer-events: none;
  }

  /* ---------- Top chrome row ---------- */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }
  /* `label` preset — Outfit 600, uppercase, tracking 0.06em (wide), xs */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--olive-11);
  }
  .eyebrow .glyph {
    display: inline-flex;
    align-items: center;
  }
  .eyebrow svg { display: block; }
  .sep { color: var(--olive-8); margin: 0 2px; }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--olive-11);
  }
  .status .pulse {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--lime-9);
    box-shadow: 0 0 0 3px rgba(189, 238, 99, 0.25), 0 0 18px rgba(189, 238, 99, 0.6);
  }

  /* ---------- Middle content ---------- */
  .main {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    align-items: center;
    gap: 36px;
    padding: 8px 0;
    position: relative;
    z-index: 2;
  }

  .hero {
    display: flex;
    flex-direction: column;
    gap: 0px;
  }
  /* Wordmark — email convention: Outfit 800, tracking -0.025em */
  .hero .line1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 128px;
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--olive-12);
  }
  .hero .line1 .dot { color: var(--lime-9); }
  /* `display` preset — Outfit 900, italic, UPPERCASE, tracking -0.02em, leading 1.1
     Secondary-sentence colour (step 11) per the app's hero convention. */
  .hero .line2 {
    font-family: 'Outfit', sans-serif;
    font-style: italic;
    font-weight: 900;
    font-size: 64px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--olive-11);
    margin-top: 8px;
  }

  .divider {
    width: 1px;
    height: 80%;
    background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.14) 30%, rgba(255,255,255,0.14) 70%, transparent 100%);
    align-self: center;
  }

  .meta {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-left: 4px;
  }
  /* `label` preset */
  .meta-row .label {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--olive-11);
    margin-bottom: 6px;
  }
  /* `card-title` preset — Outfit 700, tight tracking, snug leading, lg */
  .meta-row .value {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: var(--olive-12);
  }
  .meta-row .value .dot { color: var(--lime-9); font-weight: 800; }
  .meta-row .value .mid { color: var(--olive-8); margin: 0 8px; font-weight: 400; }

  /* ---------- Bottom row ---------- */
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  /* Hero CTA — mirrors the email template: Outfit 700, tracking -0.01em,
     non-uppercase. Sized up from the email's 16px for OG legibility. */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 24px 18px 30px;
    background: var(--lime-9);
    color: #1b1d16;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1;
    letter-spacing: -0.01em;
    border-radius: 14px;
    box-shadow:
      0 12px 28px rgba(189, 238, 99, 0.22),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -1px 0 rgba(0,0,0,0.15);
  }
  .cta .arrow {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #1b1d16;
    color: var(--lime-9);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0;
  }

  .web {
    text-align: right;
  }
  /* `label` preset */
  .web .label {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--olive-11);
    margin-bottom: 4px;
  }
  /* Wordmark convention — Outfit 800, tracking -0.025em */
  .web .url {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -0.025em;
    color: var(--olive-12);
    line-height: 1;
  }
  .web .url .dot { color: var(--lime-9); }
</style>
</head>
<body>
  <div class="stage">
    <div class="bg">
      <div class="blob blob-olive"></div>
      <div class="blob blob-lime"></div>
      <div class="blob blob-amber"></div>
      <div class="blob blob-teal"></div>
      <div class="blob blob-lime-2"></div>
      <div class="dots"></div>
    </div>
    <div class="vignette"></div>

    <div class="card">
      <!-- Top chrome -->
      <div class="top">
        <div class="eyebrow">
          <span class="glyph">
            <svg width="18" height="18" viewBox="0 0 48 48" fill="none">
              <path d="M29 11 A14 14 0 1 0 29 37" stroke="#afb1a1" stroke-width="10" stroke-linecap="round"/>
              <circle cx="38" cy="24" r="7.5" fill="#bdee63"/>
            </svg>
          </span>
          Bouldering tracker<span class="sep">—</span>EST. 2025
        </div>
        <div class="status">
          Live at chork.app
          <span class="pulse"></span>
        </div>
      </div>

      <!-- Main content -->
      <div class="main">
        <div class="hero">
          <div class="line1">chork<span class="dot">.</span></div>
          <div class="line2">Bouldering,<br>scored.</div>
        </div>
        <div class="divider"></div>
        <div class="meta">
          <div class="meta-row">
            <div class="label">For</div>
            <div class="value">Gyms &amp; crews</div>
          </div>
          <div class="meta-row">
            <div class="label">Scoring</div>
            <div class="value">Points<span class="mid">·</span>Flash<span class="mid">·</span>Zone</div>
          </div>
          <div class="meta-row">
            <div class="label">Leaderboard</div>
            <div class="value">Public Chorkboard<span class="dot">.</span></div>
          </div>
        </div>
      </div>

      <!-- Bottom row -->
      <div class="bottom">
        <div class="cta">
          Join for free
          <span class="arrow">→</span>
        </div>
        <div class="web">
          <div class="label">On the web</div>
          <div class="url">chork<span class="dot">.</span>app</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
