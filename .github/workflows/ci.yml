name: CI

# CI runs code-correctness checks only (typecheck + lint + tests).
# The deployed build is owned by Vercel's native GitHub integration
# — it runs on every push to main and pushes a preview/prod deploy
# with the real env vars from Vercel Project Settings. Running
# `pnpm build` here as well would duplicate that work, require us
# to either sync secrets to GH Actions or stub them with fake
# values, and email us twice on every failure. Single source of
# truth for the build is Vercel.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
