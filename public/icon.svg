<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Adaptive favicon. Light/dark swap happens via the `@media
    (prefers-color-scheme: dark)` rule inside the SVG — honoured by
    every modern evergreen browser (Firefox 88+, Chrome 108+,
    Safari 16+, Edge Chromium+). Older browsers fall through to
    `/favicon.ico` listed after this entry in the metadata.

    Only the arc (the "C" of the wordmark) flips — the lime dot is
    brand-fixed and reads on every background.
  -->
  <style>
    .arc { stroke: #1b1d16; }
    .dot { fill: #bdee63; }
    @media (prefers-color-scheme: dark) {
      .arc { stroke: #ecede8; }
    }
  </style>
  <path
    d="M29 11 A14 14 0 1 0 29 37"
    class="arc"
    stroke-width="10"
    stroke-linecap="round"
  />
  <circle cx="38" cy="24" r="7.5" class="dot" />
</svg>
